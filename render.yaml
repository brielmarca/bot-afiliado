services:
  - type: web
    name: bot-afiliado
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TURSO_URL
        value: libsql://bot-afiliado-brielmarca.aws-us-west-2.turso.io
      - key: TURSO_TOKEN
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ML_CLIENT_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: ML_PARTNER_ID
        sync: false
      - key: SOURCE_GROUP_IDS
        sync: false
      - key: CRON_SCHEDULE
        value: "0 */3 * * *"
      - key: MIN_DISCOUNT_DEFAULT
        value: "30"